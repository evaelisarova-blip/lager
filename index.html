<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lager</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="frame" id="frame">
    <header class="topbar">
      <div class="brand">
        <span class="brand__name">Lager</span>
      </div>
      <div class="meta">
        <span id="clock" class="meta__item">—</span>
        <span class="meta__item">Zürich</span>
      </div>
    </header>
    <main class="floor" id="floor">
    </main>
  </div>
  <div class="lightbox" id="lightbox" aria-hidden="true">
  <div class="lightbox__backdrop" id="lightboxBackdrop"></div>

  <div class="lightbox__window" role="dialog" aria-modal="true" aria-label="Buchansicht">
    <button class="lightbox__close" id="lightboxClose" type="button">×</button>
    <div class="lightbox__content">
      <img id="lightboxImage" alt="Buchcover" />
    </div>
  </div>
  </div> <script src="./app.js"></script>
</body>
</html>
